<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Địa chỉ Tho.Digital Cam</title>
    <style>
        :root { --pink: #ffc1cc; --dark-pink: #ff8fa3; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; background: #fff; }
        .header { background: var(--pink); color: white; padding: 40px; text-align: center; }
        .content { max-width: 800px; margin: auto; padding: 30px; text-align: center; }
        .info-box { background: #fff5f7; padding: 20px; border-radius: 20px; margin-bottom: 30px; border: 1px solid var(--pink); }
        .map-container { width: 100%; height: 450px; border-radius: 20px; overflow: hidden; border: 3px solid var(--pink); }
        iframe { width: 100%; height: 100%; border: none; }
        .btn-map { display: inline-block; padding: 15px 30px; background: var(--dark-pink); color: white; text-decoration: none; border-radius: 50px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📍 TÌM ĐƯỜNG ĐẾN THO.DIGITAL</h1>
    </div>
    <div class="content">
        <div class="info-box">
            <h3>Cửa hàng máy ảnh Tho.Digital</h3>
            <p>🏠 Địa chỉ: Chung cư An Sương lô a1 phường Tân Hưng Thuận quận 12, TP HCM</p>
            <p>📞 Hotline: 0903.100.867</p>
            <p>⏰ Giờ mở cửa: 08:00 - 21:00 (Cả tuần)</p>
        </div>

        <div class="map-container">
            <iframe src="https://www.google.com/maps/place/Chung+c%C6%B0+An+S%C6%B0%C6%A1ng+L%C3%B4+A1/@10.8432334,106.6219045,17z/data=!3m1!4b1!4m6!3m5!1s0x31752b2fb62a30cf:0x5684b66611159210!8m2!3d10.8432281!4d106.6244794!16s%2Fg%2F11sszkc2tn?entry=ttu&g_ep=EgoyMDI1MTIwOS4wIKXMDSoASAFQAw%3D%3D" allowfullscreen="" loading="lazy"></iframe>
        </div>

        <a href="https://maps.app.goo.gl/cUurrKxB4o2brH8j7" target="_blank" class="btn-map">MỞ BẰNG GOOGLE MAPS</a>
        <br><br>
        <a href="index.html" style="color: #aaa;">Quay về Trang chủ</a>
    </div>
</body>
</html>
